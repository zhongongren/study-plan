<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[项目名称] · 案例详情 — 陈群超</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar-modern.css">
  <link rel="stylesheet" href="css/contact-fab.css">
  <link rel="stylesheet" href="css/case-detail-template.css">
    <link rel="stylesheet" href="css/interaction-fixes.css?v=20260428-interaction-3">
</head>
<body>
  <!--
    案例详情页模板基础结构
    复制本文件后，按以下顺序替换内容：
    1. Hero：项目名称、主标题、项目元信息、首屏图。
    2. 第一章：项目背景 / 用户痛点 / 竞品洞察。
    3. 第二章：视觉策略 / 创意方向 / 设计决策。
    4. 第三章：执行流程，可复用玄星页 .step-scroll-block 结构。
    5. 第四章：完整成果图。
    6. 第五章：项目数据 / 反馈 / 总结。
  -->
  <main class="case-detail-template">
    <section class="case-hero">
      <div class="case-hero-bg" style="background-image:url('images/covers/xuanxing-x2-cover.webp');"></div>
      <div class="case-hero-overlay"></div>
      <div class="case-hero-content">
        <div class="case-tag">[项目类型] · [年份]</div>
        <h1 class="case-hero-title">[项目名称]<em>[核心主题]</em></h1>
        <p class="case-hero-desc">[一句话说明项目目标、范围和成果]</p>
      </div>
    </section>

    <section class="section" id="background">
      <div class="section-label fade-up">第一章</div>
      <h2 class="section-title fade-up">[项目背景 / 真实问题]</h2>
      <div class="divider fade-up"></div>
      <p class="section-body fade-up">[从业务、用户或竞品角度说明设计问题。]</p>
    </section>

    <section class="section" id="strategy">
      <div class="section-label fade-up">第二章</div>
      <h2 class="section-title fade-up">[设计策略 / 视觉方向]</h2>
      <div class="divider fade-up"></div>
      <p class="section-body fade-up">[说明核心视觉词、色彩、场景、信息节奏。]</p>
    </section>

    <section class="section case-process-section" id="process">
      <div class="steps-header fade-up">
        <div class="section-label">第三章</div>
        <h2 class="section-title">[从概念到落地]</h2>
        <div class="divider"></div>
        <p class="section-body">[概述执行流程与关键验证问题。]</p>
      </div>
      <div class="steps-wrapper steps-parallax">
        <!-- 复制玄星页 step-scroll-block 结构并替换 01-05 内容 -->
      </div>
    </section>

    <section class="section" id="gallery">
      <div class="section-label fade-up">第四章</div>
      <h2 class="section-title fade-up">完整成果展示</h2>
      <div class="divider fade-up"></div>
      <div class="works-gallery fade-up">
        <!-- 放置最终成果图 -->
      </div>
    </section>

    <section class="section" id="results">
      <div class="section-label fade-up">第五章</div>
      <h2 class="section-title fade-up">项目成果</h2>
      <div class="divider fade-up"></div>
      <p class="section-body fade-up">[补充上线数据、客户反馈或设计复盘。]</p>
    </section>
  </main>
  <script src="js/main.js"></script>
  <script src="js/contact-fab.js"></script>
  <script src="js/case-detail-template.js"></script>
<script src="js/interaction-fixes.js?v=20260428-interaction-3"></script>
</body>
</html>
